name: Scrape Blender Node Graphs

on:
  schedule:
    - cron: "0 3 * * 0"   # weekly, Sunday 03:00 UTC
  workflow_dispatch:
    inputs:
      max_files:
        description: "Max files to download per query (default 200)"
        default: "200"

env:
  MAX_FILES: ${{ github.event.inputs.max_files || '200' }}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: python scraper.py --max-files "$MAX_FILES" --out-dir raw/

      - name: Commit new raw files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add raw/
          git diff --cached --quiet || \
            git commit -m "chore: scrape run $(date -u +%Y-%m-%d) — $(git diff --cached --name-only | wc -l) new files"
          git push
